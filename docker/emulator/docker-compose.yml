# Android emulator (budtmo/docker-android)
# Requires host with KVM. Run from project root:
#   docker compose -f docker/emulator/docker-compose.yml up -d

services:
  emulator-1:
    image: budtmo/docker-android:emulator_13.0
    container_name: droidstack-emulator-1
    privileged: true
    ports:
      - "6080:6080"   # noVNC
      - "5555:5555"   # ADB
    environment:
      EMULATOR_DEVICE: "Samsung Galaxy S10"
      WEB_VNC: "true"
    devices:
      - /dev/kvm
    # Uncomment for persistent data:
    # volumes:
    #   - emulator-data-1:/home/androidusr

# volumes:
#   emulator-data-1:
